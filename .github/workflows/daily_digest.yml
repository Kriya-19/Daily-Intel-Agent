name: Daily Intel Digest

on:
  schedule:
    # 8:00 AM IST = 2:30 AM UTC
    - cron: "30 2 * * *"
  workflow_dispatch:  # lets you trigger it manually from GitHub UI to test

permissions:
  contents: write


jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}

        run: python src/main.py

      # Commit the new digest JSON and updated users.db back to the repo
      # This is how the Cloudflare Worker reads today's digest for button taps
      # - name: Commit digest + db
      #   run: |
      #     git config user.name "github-actions[bot]"
      #     git config user.email "github-actions[bot]@users.noreply.github.com"
      #     git add digests/ users.db
      #     git diff --staged --quiet || git commit -m "digest: $(date +'%Y-%m-%d')"
      #     git push

      - name: Commit digest + dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/ docs/ users.db
          git diff --staged --quiet || git commit -m "digest: $(date +'%Y-%m-%d')"
          git push